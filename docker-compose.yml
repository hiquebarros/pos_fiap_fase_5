version: '3.9'

services:
  trainer:
    build: ./train
    volumes:
      - model_volume:/model_data
      - ./data:/app/data:ro
    environment:
      MODEL_DIR: /model_data
      DATA_PATH: /app/data/obesity.csv
    command: ["python", "train.py"]
    restart: "no"

  api:
    build: ./api
    ports:
      - "5000:5000"
    volumes:
      - model_volume:/model_data
    environment:
      MODEL_DIR: /model_data
    depends_on:
      trainer:
        condition: service_completed_successfully

  streamlit:
    build: ./streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
    environment:
      API_URL: http://api:5000
      DATA_PATH: /app/data/obesity.csv
    depends_on:
      - api

volumes:
  model_volume:
